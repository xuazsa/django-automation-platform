{% extends 'automation/base.html' %}

{% block content %}
<style>
    .editor-container {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
    .code-area {
        flex: 1;
    }
    .code-area textarea {
        width: 100%;
        height: 400px;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 14px;
        background: #ffffff;
        color: #333333;
        border: 1px solid #ccc;
        border-radius: 5px;
        padding: 10px;
        resize: vertical;
    }
    .output-area {
        flex: 1;
    }
    .output-box {
        width: 100%;
        height: 400px;
        background: #ffffff;
        color: #333333;
        border: 1px solid #ccc;
        border-radius: 5px;
        overflow: auto;
        padding: 10px;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 14px;
    }
    .error {
        color: #d32f2f;
    }
    .success {
        color: #2e7d32;
    }
    .plot-image {
        max-width: 100%;
        margin-top: 10px;
    }
    button {
        background: #007acc;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover {
        background: #005a9e;
    }
    .examples {
        margin-top: 20px;
        padding: 10px;
        background: #f5f5f5;
        border-radius: 5px;
    }
    .example-btn {
        background: #e0e0e0;
        color: #333;
        padding: 5px 10px;
        margin: 5px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
    }
    .example-btn:hover {
        background: #ccc;
    }
    .input-dialog {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        z-index: 1000;
        width: 400px;
    }
    .input-dialog input {
        width: 100%;
        padding: 8px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 999;
    }
</style>

<h1>🐍 Python 在线执行器</h1>

<div class="editor-container">
    <div class="code-area">
        <h3>代码编辑器</h3>
        <textarea id="code" placeholder='print("Hello Python!")'>
name = input("请输入你的名字: ")
print(f"你好, {name}!")</textarea>
        <br>
        <button onclick="runCode()">▶ 执行代码 (Ctrl+Enter)</button>
    </div>
    
    <div class="output-area">
        <h3>执行结果</h3>
        <div id="output" class="output-box">点击执行按钮运行代码...</div>
    </div>
</div>

<div class="examples">
    <strong>快捷示例：</strong>
    <button class="example-btn" onclick="insertExample('input')">📥 input 示例</button>
    <button class="example-btn" onclick="insertExample('basic')">简单输出</button>
    <button class="example-btn" onclick="insertExample('loop')">循环</button>
    <button class="example-btn" onclick="insertExample('function')">函数</button>
    <button class="example-btn" onclick="insertExample('list')">列表操作</button>
    <button class="example-btn" onclick="insertExample('plot')">📊 绘图</button>
</div>

<div id="inputDialog" class="input-dialog">
    <h3 id="inputPrompt">请输入</h3>
    <input type="text" id="inputValue" placeholder="输入内容...">
    <button onclick="submitInput()">确定</button>
    <button onclick="cancelInput()">取消</button>
</div>
<div id="overlay" class="overlay"></div>

<script>
let pendingInputResolve = null;

function runCode() {
    const code = document.getElementById('code').value;
    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML = '⏳ 执行中...';
    
    fetch('/auto/api/execute_python/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({code: code})
    })
    .then(response => response.json())
    .then(data => {
        outputDiv.innerHTML = '';
        
        if (data.needs_input) {
            // 等待用户输入
            pendingInputResolve = (value) => {
                sendInput(value);
            };
            document.getElementById('inputPrompt').innerText = data.prompt || '请输入';
            document.getElementById('inputDialog').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('inputValue').value = '';
            document.getElementById('inputValue').focus();
        } else if (data.output) {
            outputDiv.innerHTML += '<div class="success">' + escapeHtml(data.output) + '</div>';
        } else if (data.image) {
            outputDiv.innerHTML += '<img src="data:image/png;base64,' + data.image + '" class="plot-image">';
        } else if (data.error) {
            outputDiv.innerHTML += '<div class="error">❌ 错误:<br>' + escapeHtml(data.error) + '</div>';
        } else {
            outputDiv.innerHTML = '<span class="success">(无输出)</span>';
        }
    })
    .catch(err => {
        outputDiv.innerHTML = '<span class="error">请求失败: ' + err + '</span>';
    });
}

function sendInput(value) {
    const code = document.getElementById('code').value;
    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML = '⏳ 处理输入...';
    
    fetch('/auto/api/execute_python/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({code: code, input_value: value})
    })
    .then(response => response.json())
    .then(data => {
        outputDiv.innerHTML = '';
        if (data.needs_input) {
            pendingInputResolve = (v) => sendInput(v);
            document.getElementById('inputPrompt').innerText = data.prompt || '请输入';
            document.getElementById('inputValue').value = '';
            document.getElementById('inputValue').focus();
        } else {
            closeInputDialog();
            if (data.output) {
                outputDiv.innerHTML += '<div class="success">' + escapeHtml(data.output) + '</div>';
            }
            if (data.image) {
                outputDiv.innerHTML += '<img src="data:image/png;base64,' + data.image + '" class="plot-image">';
            }
            if (data.error) {
                outputDiv.innerHTML += '<div class="error">❌ 错误:<br>' + escapeHtml(data.error) + '</div>';
            }
        }
    });
}

function submitInput() {
    const value = document.getElementById('inputValue').value;
    if (pendingInputResolve) {
        pendingInputResolve(value);
        pendingInputResolve = null;
    }
    closeInputDialog();
}

function cancelInput() {
    closeInputDialog();
    if (pendingInputResolve) {
        pendingInputResolve(null);
        pendingInputResolve = null;
    }
    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML += '<div class="error">用户取消了输入</div>';
}

function closeInputDialog() {
    document.getElementById('inputDialog').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

function insertExample(type) {
    const examples = {
        input: 'name = input("请输入你的名字: ")\nprint(f"你好, {name}!")',
        basic: 'print("Hello World")\n\nname = "Python"\nprint(f"欢迎使用 {name}")',
        loop: 'for i in range(5):\n    print(f"第 {i+1} 次循环")',
        function: 'def greet(name):\n    return f"你好, {name}!"\n\nprint(greet("开发者"))',
        list: 'numbers = [1, 2, 3, 4, 5]\nprint(f"原始列表: {numbers}")\nnumbers.append(6)\nprint(f"添加后: {numbers}")',
        plot: 'import numpy as np\nimport matplotlib.pyplot as plt\n\nplt.rcParams["font.sans-serif"] = ["SimHei", "DejaVu Sans"]\n\nt = np.linspace(0, 2*np.pi, 100)\ny = np.sin(t)\n\nplt.plot(t, y)\nplt.title("正弦波")\nplt.grid(True)\nplt.show()'
    };
    
    const textarea = document.getElementById('code');
    textarea.value = examples[type] || examples.basic;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('code').addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        runCode();
    }
});
</script>
{% endblock %}
