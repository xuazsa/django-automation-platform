{% extends 'monitor/base.html' %}

{% block content %}
<h1>告警规则管理</h1>

<div style="margin-bottom: 20px;">
    <button onclick="showAddForm()" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">➕ 添加规则</button>
</div>

<table border="1" cellpadding="8" style="width:100%; background: white;">
    <thead>
        <tr><th>名称</th><th>指标</th><th>条件</th><th>阈值</th><th>级别</th><th>状态</th><th>操作</th></tr>
    </thead>
    <tbody id="rules-list">
        <tr><td colspan="7" style="text-align: center;">加载中...</td></tr>
    </tbody>
</table>

<div id="addModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:8px; width:400px; z-index:1000;">
    <h3>添加告警规则</h3>
    <input type="text" id="rule-name" placeholder="规则名称" style="width:100%; margin:5px 0; padding:5px;"><br>
    <select id="rule-metric" style="width:100%; margin:5px 0; padding:5px;">
        <option value="cpu_usage">CPU使用率</option>
        <option value="memory_usage">内存使用率</option>
        <option value="disk_usage">磁盘使用率</option>
    </select><br>
    <select id="rule-operator" style="width:100%; margin:5px 0; padding:5px;">
        <option value=">">&gt;</option>
        <option value="<">&lt;</option>
        <option value=">=">&gt;=</option>
        <option value="<=">&lt;=</option>
    </select><br>
    <input type="number" id="rule-threshold" placeholder="阈值" style="width:100%; margin:5px 0; padding:5px;"><br>
    <select id="rule-severity" style="width:100%; margin:5px 0; padding:5px;">
        <option value="info">信息</option>
        <option value="warning">警告</option>
        <option value="critical">严重</option>
    </select><br>
    <input type="text" id="rule-message" placeholder="告警消息" style="width:100%; margin:5px 0; padding:5px;"><br>
    <button onclick="saveRule()" style="background:#007acc; color:white; border:none; padding:8px 15px; margin-top:10px;">保存</button>
    <button onclick="closeModal()" style="background:#6c757d; color:white; border:none; padding:8px 15px;">取消</button>
</div>
<div id="overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:999;" onclick="closeModal()"></div>

<script>
async function loadRules() {
    const response = await fetch('/monitor/api/rules/');
    const data = await response.json();
    const tbody = document.getElementById('rules-list');
    if (data.rules && data.rules.length > 0) {
        tbody.innerHTML = data.rules.map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.metric_name}</td>
                <td>${r.operator}</td>
                <td>${r.threshold}</td>
                <td>${r.severity}</td>
                <td>启用</strong>
                <td><button onclick="deleteRule(${r.id})">删除</button></td>
            </tr>
        `).join('');
    } else {
        tbody.innerHTML = '<tr><td colspan="7">暂无规则</td></tr>';
    }
}

function showAddForm() {
    document.getElementById('addModal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

function closeModal() {
    document.getElementById('addModal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

async function saveRule() {
    const rule = {
        name: document.getElementById('rule-name').value,
        metric_name: document.getElementById('rule-metric').value,
        operator: document.getElementById('rule-operator').value,
        threshold: parseFloat(document.getElementById('rule-threshold').value),
        severity: document.getElementById('rule-severity').value,
        message: document.getElementById('rule-message').value,
    };
    
    await fetch('/monitor/api/rules/create/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(rule)
    });
    closeModal();
    loadRules();
}

loadRules();
</script>
{% endblock %}
